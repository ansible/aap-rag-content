    <h1 class="title topictitle1" id="ariaid-title1">AWS secrets manager lookup</h1> 
    <div class="body refbody">
     <p class="shortdesc">Use this credential type so that automation controller can retrieve secrets from AWS Secrets Manager.</p> 
     <section class="section"> 
      <p class="p">This is part of the secret management capability. For more information, see <a class="xref" href="/documentation/en-us/red_hat_ansible_automation_platform/2.7/secure-integrate_third_party_secret_management_systems#ref-aws-secrets-manager-lookup" title="This plugin enables Amazon Web Services to be used as a credential input source to pull secrets from the Amazon Web Services Secrets Manager. The AWS Secrets Manager provides similar service to Microsoft Azure Key Vault, and the AWS collection provides a lookup plugin for it.">AWS Secrets Manager lookup</a></p> 
     </section> 
    </div> 
   </article>
