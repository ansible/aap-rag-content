    <h1 class="title topictitle1" id="ariaid-title1">HashiCorp Vault Signed SSH credential type</h1> 
    <div class="body refbody">
     <p class="shortdesc">The HashiCorp Vault Signed SSH credential type allows automation controller to retrieve signed SSH certificates from a HashiCorp Vault server.</p> 
     <section class="section"> 
      <p class="p">For more information, see <cite class="cite">HashiCorp Vault Signed SSH</cite> in <a class="xref" href="/documentation/en-us/red_hat_ansible_automation_platform/2.7/secure-integrate_third_party_secret_management_systems#GUID-29f61f6a-dc67-4c24-a153-7384461b7dfc" title="Integrating third-party secret management systems with Ansible Automation Platform lets you store credentials in your existing infrastructure instead of providing them directly to the platform.">Integrate third-party secret management systems</a>.</p> 
     </section>
