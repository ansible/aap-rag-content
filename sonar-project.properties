# sonar.projectKey and sonar.organization are set dynamically
# in .github/workflows/sonar-pr.yml based on the repo owner and name

# Python specific settings
sonar.python.coverage.reportPaths=coverage.xml
sonar.python.version=3.12

# Define the same root directory for sources and tests
sonar.sources = src/,scripts/,embeddings_model/
sonar.tests = tests/

# Include test files in test scope
sonar.test.inclusions = tests/**/*test_*.py,tests/**/test_*.py

# Exclude test files from source scope and other non-source files
sonar.exclusions = tests/**/*,**/__pycache__/**,**/*.pyc,**/migrations/**,**/.pytest_cache/**

# Wait for and enforce quality gate
sonar.qualitygate.wait=true
