[tool.ruff]

# description of all rules are available on https://docs.astral.sh/ruff/rules/
lint.select = ["D", "E", "F", "W", "C", "S", "I", "TCH", "SLOT", "RUF", "C90", "N", "YTT", "ASYNC", "TRIO"]

# we need to check 'mood' of all docstrings, this needs to be enabled explicitly
lint.extend-select = ["D401"]

lint.ignore = []
lint.pydocstyle.convention = "google"

target-version = "py312"
line-length = 100

[tool.mypy]
disable_error_code = ["union-attr", "return-value", "arg-type", "import-untyped"]
ignore_missing_imports = true

# https://docs.astral.sh/uv/guides/integration/pytorch/
[tool.uv.sources]
torch = [
  { index = "pytorch-cpu" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[project]
name = "aap-rag-content"
version = "0.1.0"
description = "RAG content for AAP chatbot"
authors = []
dependencies = [
    "PyYAML==6.0.3",
    "huggingface-hub>=0.33.1",
    "requests>=2.32.3",
    "llama-stack==0.2.22",
    "llama-stack-client==0.2.22",
    "sentence-transformers",
    "tqdm>=4.67.1",
    "numpy==2.2.6",
    "scikit-learn>=1.7.0",
    "aiosqlite>=0.21.0",
    "scipy>=1.15.3",
    "transformers>=4.50.3",
    "fastapi>=0.115.12",
    "fire>=0.7.0",
    "httpx>=0.28.1",
    "uvicorn>=0.34.3",
    "opentelemetry-sdk>=1.34.1",
    "opentelemetry-exporter-otlp-proto-http>=1.34.1",
    "aiohttp>=3.12.13",
    "sqlalchemy[asyncio]>=2.0.41",
    "torch>=2.9.0",
    "faiss-cpu>=1.11.0",
    "chardet>=5.2.0",
    "starlette>=0.49.1",
]
requires-python = "==3.12.*"
readme = "README.md"
license = "LICENSE"

[dependency-groups]
dev = [
    "black",
    "mypy",
    "ruff",
    "types-requests",
]
