[tool.ruff]

# description of all rules are available on https://docs.astral.sh/ruff/rules/
lint.select = ["D", "E", "F", "W", "C", "S", "I", "TCH", "SLOT", "RUF", "C90", "N", "YTT", "ASYNC", "TRIO"]

# we need to check 'mood' of all docstrings, this needs to be enabled explicitly
lint.extend-select = ["D401"]

lint.ignore = []
lint.pydocstyle.convention = "google"

target-version = "py312"
line-length = 100

[tool.mypy]
disable_error_code = ["union-attr", "return-value", "arg-type", "import-untyped"]
ignore_missing_imports = true

# https://docs.astral.sh/uv/guides/integration/pytorch/
[tool.uv.sources]
torch = [
  { index = "pytorch-cpu", marker = "sys_platform != 'darwin'" },
]

[[tool.uv.index]]
name = "pytorch-cpu"
url = "https://download.pytorch.org/whl/cpu"
explicit = true

[project]
name = "aap-rag-content"
version = "0.1.0"
description = "RAG content for AAP chatbot"
authors = []
dependencies = [
    "requests",
    "llama-stack==0.2.22",
    "llama-stack-client==0.2.22",
    "torch",
    "sqlalchemy[asyncio]",
    "faiss-cpu",
    "chardet",
    "sentence-transformers",
    # aiosqlite 0.22+ hangs on exit due to llama-stack not closing connections properly
    # https://github.com/llamastack/llama-stack/issues/4587
    "aiosqlite==0.21.0",
    # CVE fixes
    "aiohttp>=3.13.3",  # CVE-2025-69223, CVE-2025-69224, CVE-2025-69225, CVE-2025-69226, CVE-2025-69227, CVE-2025-69228, CVE-2025-69229, CVE-2025-69230
    "filelock>=3.20.3",
    "urllib3>=2.6.3",  # CVE-2025-66418, CVE-2025-66471, CVE-2026-21441
    "starlette>=0.49.1",  # CVE-2025-62727
    "pyasn1==0.6.2",
]
requires-python = "==3.12.*"
readme = "README.md"
license = {file = "LICENSE"}

[dependency-groups]
dev = [
    "black",
    "mypy",
    "ruff",
    "types-requests",
]
