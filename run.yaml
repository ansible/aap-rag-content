version: '2'
image_name: remote-vllm
apis:
- inference
- tool_runtime
- vector_io
- files
providers:
  inference:
  - provider_id: sentence-transformers
    provider_type: inline::sentence-transformers
    config: {}
  vector_io:
  - provider_id: faiss
    provider_type: inline::faiss
    config:
      kvstore:
        type: sqlite
        namespace: null
        db_path: ${env.SQLITE_STORE_DIR:=./llama_stack_vector_db}/faiss_store.db
  tool_runtime:
  - provider_id: rag-runtime
    provider_type: inline::rag-runtime
    config: {}
  files:
    - provider_id: localfs
      provider_type: inline::localfs
      config:
        storage_dir: ./llama_stack_files
        metadata_store:
          type: sqlite
          namespace: null
          db_path: ./llama_stack_files/files.db
models:
- metadata:
    embedding_dimension: 768
  model_id: sentence-transformers/embeddings_model
  provider_id: sentence-transformers
  model_type: embedding
  provider_model_id: ./embeddings_model
vector_dbs: []
tool_groups:
- toolgroup_id: builtin::rag
  provider_id: rag-runtime
